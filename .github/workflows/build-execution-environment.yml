---
name: Build Execution Environment

on:
  # Run weekly on Sundays at 2 AM UTC
  schedule:
    - cron: '0 2 * * 0'

  # Run on pull requests to main branch
  pull_request:
    branches:
      - main

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional tag for the image (optional)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-builder
        run: |
          python -m pip install --upgrade pip
          pip install ansible-builder

      - name: Log in to Source Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SOURCE_REGISTRY }}
          username: ${{ secrets.SOURCE_REGISTRY_USERNAME }}
          password: ${{ secrets.SOURCE_REGISTRY_PASSWORD }}

      - name: Log in to Destination Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEST_REGISTRY }}
          username: ${{ secrets.DEST_REGISTRY_USERNAME }}
          password: ${{ secrets.DEST_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          # Generate timestamp-based tag
          TIMESTAMP_TAG=$(date -u +%Y%m%d-%H%M%S)

          # Build tag list
          TAGS="${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:latest"
          TAGS="${TAGS},${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:${TIMESTAMP_TAG}"

          # Add custom tag if provided
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS},${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:${{ inputs.tag }}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "timestamp_tag=${TIMESTAMP_TAG}" >> $GITHUB_OUTPUT

      - name: Build execution environment
        working-directory: execution-environment
        run: |
          ansible-builder build \
            --tag ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:latest \
            --tag ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:${{ steps.tags.outputs.timestamp_tag }} \
            --file execution-environment.yml \
            --container-runtime docker \
            --verbosity 3

      - name: Tag additional versions
        if: inputs.tag != ''
        run: |
          docker tag \
            ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:latest \
            ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:${{ inputs.tag }}

      - name: Push images to destination registry
        run: |
          docker push ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:latest
          docker push ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:${{ steps.tags.outputs.timestamp_tag }}

          if [ -n "${{ inputs.tag }}" ]; then
            docker push ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:${{ inputs.tag }}
          fi

      - name: Image summary
        run: |
          echo "## Execution Environment Build Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Destination Registry:** ${{ secrets.DEST_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags pushed:" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.timestamp_tag }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.tag }}" ]; then
            echo "- \`${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "podman pull ${{ secrets.DEST_REGISTRY }}/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
